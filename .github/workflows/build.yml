name: release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag da release (ex: v1.0.9). Obrigatoria para publicar via Run workflow."
        required: false
        type: string

permissions:
  contents: write

jobs:
  test-unit:
    name: Test – Unit (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  test-e2e:
    name: Test – E2E (Playwright)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

  build-mac:
    name: Build – macOS (DMG)
    runs-on: macos-latest
    needs: [test-unit, test-e2e]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build web assets + package DMG
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run desktop:build:mac
          projectPath: .

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Writing-Tools-mac
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 30

  build-win:
    name: Build – Windows (NSIS installer)
    runs-on: windows-latest
    needs: [test-unit, test-e2e]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build web assets + package installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run desktop:build:win
          projectPath: .

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Writing-Tools-win
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30

  publish-release:
    name: Publish GitHub Release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: Writing-Tools-mac
          path: release-assets/mac

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Writing-Tools-win
          path: release-assets/win

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.exe
