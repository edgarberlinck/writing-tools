name: Build Desktop Apps

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build-mac:
    name: Build – macOS (DMG)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web assets + package DMG
        run: npm run build && npx electron-builder --mac --publish never

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Writing-Tools-mac
          path: release/*.dmg
          if-no-files-found: error
          retention-days: 30

  build-win:
    name: Build – Windows (NSIS installer)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web assets + package installer
        run: npm run build && npx electron-builder --win --publish never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Writing-Tools-win
          path: release/*.exe
          if-no-files-found: error
          retention-days: 30
